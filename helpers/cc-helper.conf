#!/usr/bin/env bash
#
# cc-helper.conf
# ==============
# helpers/ 配下のヘルパーシェル(ccdiff.sh / cczip.sh)が読み込む設定ファイル。
# ここに普段使う値を書いておくことで、コマンドラインで毎回指定する
# パラメータを減らせます。
#
# ルール:
#   - すべて bash の変数代入として書く(このファイルは source される)。
#   - `${VAR:-既定値}` 形式にしてあるため、同名の環境変数が設定されている
#     場合は環境変数が優先される(一時的な上書きに便利)。
#   - 相対パスは「この設定ファイルのあるディレクトリ(helpers/)」基準で解決を
#     試み、無ければカレントディレクトリ基準で解決される。迷ったら絶対パス推奨。
#

# --- リポジトリ / リージョン -------------------------------------------------
# 対象の CodeCommit リポジトリ名。
# ここに書いておけば、ヘルパー実行時の -r 指定を省略できる(必須項目)。
CC_REPOSITORY="${CC_REPOSITORY:-}"

# 使用する AWS リージョン。
CC_REGION="${CC_REGION:-ap-northeast-1}"

# --- スイッチロール(重要) ----------------------------------------------------
# CodeCommit 権限が無い場合に、別チーム提供のシェルを source して
# 自動でスイッチロールするか(true / false)。
CC_AUTO_ASSUME_ROLE="${CC_AUTO_ASSUME_ROLE:-false}"

# スイッチロール用シェル(別チーム提供)のパス。
# 相対パスで書いてもヘルパー側で必ず絶対パスへ変換してから元スクリプトへ
# 渡されるため、どのディレクトリから実行しても source が正常に動作する。
# 例: CC_ASSUME_ROLE_SCRIPT="/opt/team/assume_role.sh"
CC_ASSUME_ROLE_SCRIPT="${CC_ASSUME_ROLE_SCRIPT:-}"

# --- ブランチ選択 -------------------------------------------------------------
# ブランチ名を引数で指定しなかった場合に、-B/--branch-dir として使う
# ディレクトリ(配下の git リポジトリのチェックアウト中ブランチから対話選択)。
# 例: CC_BRANCH_DIR="${HOME}/work"
CC_BRANCH_DIR="${CC_BRANCH_DIR:-}"

# --- cczip.sh 用 --------------------------------------------------------------
# ZIP の保存先ディレクトリの既定値(引数で上書き可)。
CC_ZIP_OUTPUT_DIR="${CC_ZIP_OUTPUT_DIR:-./codecommit-zip}"

# --- 元スクリプトの場所 -------------------------------------------------------
# ラップ対象スクリプト(codecommit-branch-diff.sh / codecommit-branch-zip.sh)の
# 配置ディレクトリ。空なら helpers/ の親ディレクトリを使用する。
# ヘルパーだけ別の場所へ配置する場合はここで指定する。
# 例: CC_SCRIPTS_DIR="/opt/tools/CodeCommit_Git_branch_Get"
CC_SCRIPTS_DIR="${CC_SCRIPTS_DIR:-}"

# --- 常に付与する追加オプション -----------------------------------------------
# 元スクリプトへ毎回渡したいオプションを bash 配列で列挙する。
# コマンドラインで同じオプションを指定した場合はそちらが優先される
# (元スクリプトは後から指定した値で上書きするため)。
# 例: CC_DIFF_EXTRA_ARGS=(--no-pager --context 10 --stat-only)
CC_DIFF_EXTRA_ARGS=()
# 例: CC_ZIP_EXTRA_ARGS=(--full-clone)
CC_ZIP_EXTRA_ARGS=()
